name: Deploy to Cloud Run

on:
  push:
    branches: [ "main" ]

env:
  PROJECT_ID: comite-torax-app
  REGION: southamerica-east1
  SERVICE: comite-torax-app
  AR_REPO: comite-torax
  IMAGE: comite-torax-app
  CLOUD_SQL_INSTANCE: comite-torax-app:southamerica-east1:db-comite

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/166445237528/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-deployer@comite-torax-app.iam.gserviceaccount.com"

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push image
        run: |
          IMAGE_URI="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE }}:${{ github.sha }}"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ env.SERVICE }}" \
            --image "$IMAGE_URI" \
            --region "${{ env.REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --add-cloudsql-instances "${{ env.CLOUD_SQL_INSTANCE }}" \
            --set-env-vars SECRET_KEY="${{ secrets.SECRET_KEY }}",CLOUD_SQL_CONNECTION_NAME="${{ env.CLOUD_SQL_INSTANCE }}",DB_USER="${{ secrets.DB_USER }}",DB_PASS="${{ secrets.DB_PASS }}",DB_NAME="${{ secrets.DB_NAME }}"
